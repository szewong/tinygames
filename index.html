<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小遊戲">
  <meta name="theme-color" content="#faf7f2">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon-source.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <title>小遊戲 — 趣味遊戲合集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="launcher">

  <header class="launcher-header">
    <h1 class="launcher-title">小 遊 戲</h1>
    <p class="launcher-subtitle">輕鬆動腦，隨時可玩</p>
  </header>

  <main class="game-grid">

    <a class="game-card sudoku-card" href="sudoku/index.html">
      <div class="card-icon">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <rect x="6" y="6" width="88" height="88" rx="8" fill="#fff" stroke="#8a7d72" stroke-width="3"/>
          <line x1="35" y1="6"  x2="35" y2="94" stroke="#8a7d72" stroke-width="2"/>
          <line x1="65" y1="6"  x2="65" y2="94" stroke="#8a7d72" stroke-width="2"/>
          <line x1="6"  y1="35" x2="94" y2="35" stroke="#8a7d72" stroke-width="2"/>
          <line x1="6"  y1="65" x2="94" y2="65" stroke="#8a7d72" stroke-width="2"/>
          <text x="20" y="28" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#3d3229" text-anchor="middle">5</text>
          <text x="50" y="58" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#c9956b" text-anchor="middle">7</text>
          <text x="80" y="88" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#3d3229" text-anchor="middle">3</text>
          <text x="50" y="28" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#3d3229" text-anchor="middle">2</text>
          <text x="20" y="88" font-family="-apple-system, sans-serif" font-size="22" font-weight="700" fill="#3d3229" text-anchor="middle">9</text>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">數 獨</div>
        <div class="card-subtitle">9 × 9 邏輯推理</div>
      </div>
    </a>

    <a class="game-card tetris-card" href="tetris/index.html">
      <div class="card-icon">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <rect x="6" y="6" width="88" height="88" rx="8" fill="#2b2520"/>
          <!-- L piece -->
          <rect x="14" y="62" width="16" height="16" fill="#d99a55" stroke="#3a322c" stroke-width="1"/>
          <rect x="30" y="62" width="16" height="16" fill="#d99a55" stroke="#3a322c" stroke-width="1"/>
          <rect x="46" y="62" width="16" height="16" fill="#d99a55" stroke="#3a322c" stroke-width="1"/>
          <rect x="46" y="46" width="16" height="16" fill="#d99a55" stroke="#3a322c" stroke-width="1"/>
          <!-- T piece -->
          <rect x="14" y="78" width="16" height="16" fill="#a87bc5" stroke="#3a322c" stroke-width="1"/>
          <rect x="30" y="78" width="16" height="16" fill="#a87bc5" stroke="#3a322c" stroke-width="1"/>
          <rect x="46" y="78" width="16" height="16" fill="#a87bc5" stroke="#3a322c" stroke-width="1"/>
          <!-- I piece floating -->
          <rect x="62" y="22" width="16" height="16" fill="#5dc7d8" stroke="#3a322c" stroke-width="1"/>
          <rect x="62" y="38" width="16" height="16" fill="#5dc7d8" stroke="#3a322c" stroke-width="1"/>
          <rect x="62" y="54" width="16" height="16" fill="#5dc7d8" stroke="#3a322c" stroke-width="1"/>
          <rect x="62" y="70" width="16" height="16" fill="#5dc7d8" stroke="#3a322c" stroke-width="1"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">俄羅斯方塊</div>
        <div class="card-subtitle">經典消行遊戲</div>
      </div>
    </a>

    <a class="game-card candy-card" href="candy/index.html">
      <div class="card-icon">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <rect x="6" y="6" width="88" height="88" rx="8" fill="#b8c6d6"/>
          <ellipse cx="26" cy="26" rx="11" ry="6" fill="#e84545"/>
          <ellipse cx="23" cy="24" rx="5" ry="1.5" fill="#ffffff" opacity="0.8"/>
          <rect x="40" y="15" width="22" height="22" rx="4" fill="#7ac142"/>
          <rect x="42" y="17" width="10" height="4" rx="2" fill="#ffffff" opacity="0.65"/>
          <circle cx="76" cy="26" r="12" fill="#4a90e2"/>
          <circle cx="73" cy="23" r="3.5" fill="#ffffff" opacity="0.9"/>
          <path d="M26 48 C36 58 36 72 26 80 C16 72 16 58 26 48 Z" fill="#f9c74f"/>
          <ellipse cx="23" cy="54" rx="2.5" ry="5" fill="#ffffff" opacity="0.75" transform="rotate(-20 23 54)"/>
          <ellipse cx="50" cy="65" rx="13" ry="9" fill="#f39c12"/>
          <ellipse cx="46" cy="60" rx="6" ry="2" fill="#ffffff" opacity="0.8"/>
          <polygon points="76,50 88,58 88,72 76,80 64,72 64,58" fill="#9b59b6"/>
          <circle cx="72" cy="60" r="2.2" fill="#ffffff" opacity="0.85"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">糖果消消樂</div>
        <div class="card-subtitle">三顆連線消糖果</div>
      </div>
    </a>

    <a class="game-card nums-card" href="2048/index.html">
      <div class="card-icon">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <rect x="6" y="6" width="88" height="88" rx="8" fill="#b8a389"/>
          <rect x="14" y="14" width="32" height="32" rx="5" fill="#eee4da"/>
          <text x="30" y="38" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#6b5a4a" text-anchor="middle">2</text>
          <rect x="54" y="14" width="32" height="32" rx="5" fill="#f2b179"/>
          <text x="70" y="38" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
          <rect x="14" y="54" width="32" height="32" rx="5" fill="#f67c5f"/>
          <text x="30" y="78" font-family="-apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">8</text>
          <rect x="54" y="54" width="32" height="32" rx="5" fill="#edc22e"/>
          <text x="70" y="76" font-family="-apple-system, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle">2048</text>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">2 0 4 8</div>
        <div class="card-subtitle">滑動合成數字</div>
      </div>
    </a>

    <a class="game-card geo-card" href="geo/index.html">
      <div class="card-icon">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <rect x="6" y="6" width="88" height="88" rx="8" fill="#eef5fb"/>
          <circle cx="50" cy="50" r="32" fill="#a8d4f0"/>
          <path d="M 26 44 Q 40 40 50 46 T 74 48" stroke="#2e7ab8" stroke-width="2" fill="#7fb6dc"/>
          <path d="M 22 60 Q 42 64 56 59 T 78 62" stroke="#2e7ab8" stroke-width="2" fill="#7fb6dc"/>
          <path d="M 46 26 L 50 42 L 54 26 Z" fill="#7fb6dc" stroke="#2e7ab8" stroke-width="1.5"/>
          <circle cx="36" cy="50" r="3" fill="#4fb071"/>
          <circle cx="58" cy="42" r="3" fill="#d95656"/>
          <circle cx="64" cy="60" r="3" fill="#edc850"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="card-title">認識世界</div>
        <div class="card-subtitle">首都與大洲</div>
      </div>
    </a>

  </main>

  <footer class="launcher-footer">
    <span>iPad 平板觸控優化</span>
    <span class="version-badge" id="version-badge" aria-label="version"></span>
  </footer>

</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading) return;
      reloading = true;
      location.reload();
    });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.serviceWorker.getRegistration()
          .then(r => r && r.update())
          .catch(() => {});
      }
    });
  }

  // Show the deployed version in the footer
  fetch('./version.json', { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(v => {
      if (!v || !v.commit) return;
      const el = document.getElementById('version-badge');
      if (el) el.textContent = `v ${v.commit} · ${v.date}`;
    })
    .catch(() => {});
</script>
</body>
</html>
