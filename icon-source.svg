<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a179"/>
      <stop offset="1" stop-color="#a6774e"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded-square background (iOS-style corner radius ~22.5%) -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- 2x2 grid of game-representative mini tiles -->
  <g filter="url(#soft-shadow)">

    <!-- Top-left: Sudoku -->
    <rect x="56" y="56" width="186" height="186" rx="24" fill="#faf7f2"/>
    <g stroke="#8a7d72" stroke-width="3" fill="none">
      <line x1="118" y1="62" x2="118" y2="236"/>
      <line x1="180" y1="62" x2="180" y2="236"/>
      <line x1="62" y1="118" x2="236" y2="118"/>
      <line x1="62" y1="180" x2="236" y2="180"/>
    </g>
    <text x="88" y="108" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#3d3229" text-anchor="middle">5</text>
    <text x="149" y="170" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#c9956b" text-anchor="middle">7</text>
    <text x="210" y="228" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#3d3229" text-anchor="middle">3</text>

    <!-- Top-right: Tetris -->
    <rect x="270" y="56" width="186" height="186" rx="24" fill="#2b2520"/>
    <!-- L-piece -->
    <rect x="286" y="178" width="34" height="34" fill="#d99a55" stroke="#3a322c" stroke-width="1.5"/>
    <rect x="320" y="178" width="34" height="34" fill="#d99a55" stroke="#3a322c" stroke-width="1.5"/>
    <rect x="354" y="178" width="34" height="34" fill="#d99a55" stroke="#3a322c" stroke-width="1.5"/>
    <rect x="354" y="144" width="34" height="34" fill="#d99a55" stroke="#3a322c" stroke-width="1.5"/>
    <!-- I-piece tall cyan -->
    <rect x="400" y="80"  width="28" height="28" fill="#5dc7d8" stroke="#3a322c" stroke-width="1.5"/>
    <rect x="400" y="108" width="28" height="28" fill="#5dc7d8" stroke="#3a322c" stroke-width="1.5"/>
    <rect x="400" y="136" width="28" height="28" fill="#5dc7d8" stroke="#3a322c" stroke-width="1.5"/>

    <!-- Bottom-left: Candy -->
    <rect x="56" y="270" width="186" height="186" rx="24" fill="#ff6aa8"/>
    <!-- red bean -->
    <ellipse cx="96" cy="318" rx="26" ry="14" fill="#e84545"/>
    <ellipse cx="88" cy="312" rx="10" ry="3" fill="#ffffff" opacity="0.85"/>
    <!-- green pillow -->
    <rect x="146" y="298" width="50" height="50" rx="8" fill="#7ac142"/>
    <rect x="152" y="304" width="22" height="8" rx="4" fill="#ffffff" opacity="0.7"/>
    <!-- blue sphere -->
    <circle cx="96" cy="400" r="26" fill="#4a90e2"/>
    <circle cx="88" cy="392" r="8" fill="#ffffff" opacity="0.85"/>
    <!-- purple hex -->
    <polygon points="170,366 200,382 200,414 170,430 140,414 140,382" fill="#9b59b6"/>
    <circle cx="156" cy="392" r="5" fill="#ffffff" opacity="0.85"/>

    <!-- Bottom-right: 2048 -->
    <rect x="270" y="270" width="186" height="186" rx="24" fill="#b8a389"/>
    <rect x="286" y="286" width="78" height="78" rx="10" fill="#eee4da"/>
    <text x="325" y="340" font-family="-apple-system, sans-serif" font-size="46" font-weight="800" fill="#6b5a4a" text-anchor="middle">2</text>
    <rect x="372" y="286" width="78" height="78" rx="10" fill="#f2b179"/>
    <text x="411" y="340" font-family="-apple-system, sans-serif" font-size="46" font-weight="800" fill="#ffffff" text-anchor="middle">4</text>
    <rect x="286" y="372" width="78" height="78" rx="10" fill="#f67c5f"/>
    <text x="325" y="426" font-family="-apple-system, sans-serif" font-size="46" font-weight="800" fill="#ffffff" text-anchor="middle">8</text>
    <rect x="372" y="372" width="78" height="78" rx="10" fill="#edc22e"/>
    <text x="411" y="420" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">2048</text>

  </g>
</svg>
